<!DOCTYPE html>
<html lang="en">
<head>

<title>Halal Near Me — Find Halal Food &amp; Prayer Spaces Across the GTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --forest:#0B4A3A;
  --forest-dark:#073226;
  --forest-tint:#E4EEE9;
  --navy:#0D1B2A;
  --gold:#C89B3C;
  --gold-light:#E9CE87;
  --cream:#FAF7F0;
  --white:#FFFFFF;
  --ink:#152019;
  --ink-soft:#4C5A52;
  --line:#DCE3DC;
  --danger:#B8452F;
  --radius:14px;
  --shadow:0 4px 18px rgba(13,27,26,0.08);
  --shadow-lg:0 12px 40px rgba(13,27,26,0.16);
}
[data-theme="dark"]{
  --cream:#0E1712;
  --white:#152019;
  --ink:#F3F1EA;
  --ink-soft:#B7C2BA;
  --line:#28362E;
  --forest-tint:#152A22;
  --shadow:0 4px 18px rgba(0,0,0,0.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
body{margin:0;}
html,body{background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
h1,h2,h3,h4{font-family:'Fraunces',serif;margin:0;color:var(--ink);letter-spacing:-0.01em;}
p{margin:0;color:var(--ink-soft);line-height:1.6;}
a{color:inherit;text-decoration:none;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
.mono{font-family:'IBM Plex Mono',monospace;}
img,svg{display:block;}
::selection{background:var(--gold-light);color:var(--navy);}

#app{min-height:100vh;display:flex;flex-direction:column;}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
.section{padding:64px 0;}
.section-tight{padding:36px 0;}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--forest);font-weight:500;}
[data-theme="dark"] .eyebrow{color:var(--gold-light);}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
.section-head h2{font-size:30px;}
.section-sub{color:var(--ink-soft);margin-top:6px;max-width:520px;}

/* ---------- Header ---------- */
header.site{position:sticky;top:0;z-index:100;background:var(--cream);border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
.nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1180px;margin:0 auto;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:20px;cursor:pointer;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:var(--forest);display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-size:17px;flex-shrink:0;}
.nav-links{display:flex;gap:26px;align-items:center;}
.nav-links a{font-size:14.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;padding:6px 0;border-bottom:2px solid transparent;}
.nav-links a:hover,.nav-links a.active{color:var(--forest);border-color:var(--gold);}
[data-theme="dark"] .nav-links a:hover,[data-theme="dark"] .nav-links a.active{color:var(--gold-light);}
.nav-actions{display:flex;align-items:center;gap:10px;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:16px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14.5px;border:1px solid transparent;transition:transform .12s ease;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:hover{background:var(--forest-dark);}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border-color:var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--forest);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:999px;}
.btn-block{width:100%;}
.hamburger{display:none;}
.mobile-menu{display:none;}

/* ---------- Hero ---------- */
.hero{position:relative;background:radial-gradient(circle at 15% 20%,rgba(200,155,60,.12),transparent 45%),linear-gradient(180deg,var(--navy) 0%,var(--forest-dark) 100%);color:#fff;overflow:hidden;}
.hero-inner{max-width:1180px;margin:0 auto;padding:88px 24px 64px;position:relative;z-index:2;}
.hero-pin{position:absolute;opacity:.15;font-size:120px;}
.hero h1{font-size:52px;line-height:1.06;color:#fff;max-width:760px;font-weight:600;}
.hero p.lead{color:#D9E2DC;font-size:18px;max-width:560px;margin-top:18px;}
.hero-cta{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;}
.search-bar{margin-top:36px;background:#fff;border-radius:16px;padding:8px;display:flex;gap:8px;box-shadow:var(--shadow-lg);max-width:720px;flex-wrap:wrap;}
.search-bar input,.search-bar select{border:none;outline:none;font-family:'Inter',sans-serif;font-size:14.5px;padding:12px 14px;background:transparent;color:var(--ink);flex:1;min-width:140px;}
.hero-stats{display:flex;gap:34px;margin-top:44px;flex-wrap:wrap;}
.hero-stat b{display:block;font-family:'Fraunces',serif;font-size:26px;color:var(--gold-light);}
.hero-stat span{font-size:12.5px;color:#B9C4BE;text-transform:uppercase;letter-spacing:.08em;}

/* ---------- Cards ---------- */
.grid{display:grid;gap:22px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:980px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .15s ease,box-shadow .15s ease;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.card-media{height:150px;background:linear-gradient(135deg,var(--forest-tint),var(--forest) 220%);display:flex;align-items:center;justify-content:center;font-size:42px;position:relative;}
.card-media .fav{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:15px;}
.card-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px;flex:1;}
.card-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-title-row h4{font-size:17px;}
.rating{font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:var(--forest-tint);color:var(--forest);padding:3px 8px;border-radius:6px;white-space:nowrap;}
[data-theme="dark"] .rating{color:var(--gold-light);}
.card-meta{font-size:13px;color:var(--ink-soft);}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.badge{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;}
.badge-hand{background:#DDF3E4;color:#1D7A44;}
.badge-machine{background:#FCF0CB;color:#8A6B10;}
.badge-hma{background:#DCEAFB;color:#1B5FA8;}
.badge-hfsaa{background:#FBE3D2;color:#B15A1F;}
.badge-owned{background:#EAE0F7;color:#6B3FA0;}
.badge-unknown{background:#EDEDED;color:#666;}
.badge-cuisine{background:var(--forest-tint);color:var(--forest);}
[data-theme="dark"] .badge-cuisine{color:var(--gold-light);}
.card-foot{display:flex;gap:8px;margin-top:auto;padding-top:6px;}
.pill{font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;color:var(--ink-soft);}

/* ---------- Filters / Directory ---------- */
.directory-layout{display:grid;grid-template-columns:250px 1fr;gap:32px;align-items:start;}
@media(max-width:900px){.directory-layout{grid-template-columns:1fr;}}
.filter-panel{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:20px;position:sticky;top:80px;}
.filter-group{margin-bottom:20px;}
.filter-group h5{font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:10px;font-weight:700;font-family:'Inter',sans-serif;}
.check-row{display:flex;align-items:center;gap:8px;font-size:14px;padding:5px 0;color:var(--ink);cursor:pointer;}
.check-row input{accent-color:var(--forest);width:15px;height:15px;}
.select-field,.text-field,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--white);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;outline:none;}
.select-field:focus,.text-field:focus,textarea:focus{border-color:var(--forest);}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.toolbar .count{font-size:13.5px;color:var(--ink-soft);}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{font-size:12.5px;background:var(--forest-tint);color:var(--forest);padding:5px 10px;border-radius:999px;display:flex;align-items:center;gap:6px;}
[data-theme="dark"] .chip{color:var(--gold-light);}
.chip button{background:none;border:none;color:inherit;font-size:13px;padding:0;}
.empty-state{padding:60px 20px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);}
.empty-state h4{margin-bottom:8px;}

/* ---------- Detail page ---------- */
.detail-hero{background:linear-gradient(135deg,var(--forest-tint),var(--white));border-radius:20px;padding:34px;display:flex;gap:28px;flex-wrap:wrap;align-items:center;margin-bottom:32px;}
.detail-icon{width:110px;height:110px;border-radius:20px;background:var(--forest);color:var(--gold-light);font-size:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.info-grid{display:grid;grid-template-columns:2fr 1fr;gap:32px;}
@media(max-width:900px){.info-grid{grid-template-columns:1fr;}}
.info-block{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
.info-block h4{margin-bottom:12px;font-size:16px;}
.kv-row{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--line);}
.kv-row:last-child{border-bottom:none;}
.kv-row span:first-child{color:var(--ink-soft);}
.disclaimer{background:#FBF1DC;border:1px solid var(--gold);color:#7A5B12;padding:14px 16px;border-radius:10px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start;}
[data-theme="dark"] .disclaimer{background:#2A2410;color:var(--gold-light);}

/* ---------- Forms ---------- */
.form-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:30px;max-width:720px;}
.form-row{margin-bottom:16px;}
.form-row label{display:block;font-size:13.5px;font-weight:600;margin-bottom:6px;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.form-2col{grid-template-columns:1fr;}}
.radio-tile-row{display:flex;flex-wrap:wrap;gap:8px;}
.radio-tile{border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:13.5px;cursor:pointer;}
.radio-tile.active{border-color:var(--forest);background:var(--forest-tint);color:var(--forest);}
[data-theme="dark"] .radio-tile.active{color:var(--gold-light);}

/* ---------- Testimonials / misc ---------- */
.testi-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
.testi-card p{font-style:italic;color:var(--ink);margin-bottom:14px;}
.testi-author{font-size:13px;color:var(--ink-soft);font-weight:600;}
.city-pill{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;font-weight:600;font-size:14px;transition:.15s;}
.city-pill:hover{border-color:var(--forest);color:var(--forest);}
.why-card{padding:22px;border-radius:var(--radius);background:var(--white);border:1px solid var(--line);}
.why-card .ic{font-size:26px;margin-bottom:10px;}
.banner-note{background:var(--forest-tint);border:1px solid var(--forest);color:var(--forest);padding:12px 18px;border-radius:10px;font-size:13.5px;margin-bottom:26px;}
[data-theme="dark"] .banner-note{color:var(--gold-light);}

/* ---------- Dashboards / tables ---------- */
.dash-shell{display:grid;grid-template-columns:220px 1fr;gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--white);min-height:520px;}
@media(max-width:800px){.dash-shell{grid-template-columns:1fr;}}
.dash-side{background:var(--forest-tint);padding:20px 14px;border-right:1px solid var(--line);}
.dash-side a{display:block;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.dash-side a.active,.dash-side a:hover{background:var(--forest);color:#fff;}
.dash-main{padding:26px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-box{border:1px solid var(--line);border-radius:12px;padding:16px;}
.stat-box b{font-family:'Fraunces',serif;font-size:26px;display:block;}
.stat-box span{font-size:12.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;padding:10px 8px;border-bottom:2px solid var(--line);color:var(--ink-soft);font-size:12px;text-transform:uppercase;letter-spacing:.04em;}
td{padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
.status-tag{padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;}
.status-pending{background:#FCF0CB;color:#8A6B10;}
.status-approved{background:#DDF3E4;color:#1D7A44;}
.status-rejected{background:#FADADA;color:#B8452F;}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border-radius:999px;border:1px solid var(--line);font-size:13.5px;font-weight:600;background:var(--white);color:var(--ink-soft);}
.tab-btn.active{background:var(--forest);border-color:var(--forest);color:#fff;}

/* ---------- Toast / modal ---------- */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:999px;font-size:13.5px;box-shadow:var(--shadow-lg);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.modal-bg{position:fixed;inset:0;background:rgba(13,27,26,.55);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal-box{background:var(--white);border-radius:16px;padding:26px;max-width:420px;width:100%;}
.modal-box h3{margin-bottom:10px;}

/* ---------- Footer ---------- */
footer.site{background:var(--navy);color:#C7D1CB;margin-top:auto;padding-top:56px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;padding-bottom:32px;}
@media(max-width:800px){.footer-grid{grid-template-columns:1fr 1fr;}}
footer.site h5{color:#fff;font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
footer.site a{display:block;font-size:14px;color:#B9C4BE;padding:5px 0;}
footer.site a:hover{color:var(--gold-light);}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding:18px 24px;font-size:12.5px;color:#8E9C95;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}

/* ---------- Responsive nav ---------- */
@media(max-width:860px){
  .nav-links{display:none;}
  .hamburger{display:flex;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);align-items:center;justify-content:center;background:var(--white);}
  .mobile-menu.open{display:flex;flex-direction:column;padding:10px 24px 18px;gap:2px;border-bottom:1px solid var(--line);background:var(--cream);}
  .mobile-menu a{padding:10px 4px;font-size:15px;font-weight:500;border-bottom:1px solid var(--line);}
  .hero h1{font-size:36px;}
  .detail-hero{padding:22px;}
}
.section-badge-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft);margin-top:10px;}
.legend-dot{display:inline-flex;align-items:center;gap:6px;}
</style>
</head>

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ---------------- ROUTER ---------------- */
function parseHash(){
  const h = location.hash.slice(1) || "/home";
  const parts = h.split("/").filter(Boolean);
  return parts;
}
window.addEventListener('hashchange', ()=>{route(); window.scrollTo(0,0);});

function route(){
  const parts = parseHash();
  state.route = parts[0]||"home";
  state.params = {slug: parts[1]};
  render();
}

function go(path){ location.hash = path; }

/* ---------------- BADGE HELPERS ---------------- */
function methodBadge(methodKey){
  const m = METHODS[methodKey] || METHODS.unknown;
  return `<span class="badge ${m.cls}">${m.dot} ${m.label}</span>`;
}

function amenityBadges(r){
  let out = "";
  if(r.prayer) out += `<span class="pill">🕌 Prayer space</span>`;
  if(r.parking) out += `<span class="pill">🅿️ Parking</span>`;
  if(r.delivery) out += `<span class="pill">🛵 Delivery</span>`;
  return out;
}

function toggleFav(type,id){

  render();

/* ---------------- PAGE: RESTAURANT DIRECTORY ---------------- */
function pageRestaurants(presetMethod){
  const f = state.filters;
  let list = RESTAURANTS.filter(r=>{
    if(presetMethod && r.method!==presetMethod) return false;
    if(f.q && !(r.name.toLowerCase().includes(f.q.toLowerCase()) || r.cuisine.join(" ").toLowerCase().includes(f.q.toLowerCase()))) return false;
    if(f.city && r.city!==f.city) return false;
    if(f.cuisine && !r.cuisine.includes(f.cuisine)) return false;
    if(f.methodFilters.size && !f.methodFilters.has(r.method)) return false;
    if(f.amenities.has('prayer') && !r.prayer) return false;
    if(f.amenities.has('parking') && !r.parking) return false;
    if(f.amenities.has('delivery') && !r.delivery) return false;
    if(f.amenities.has('takeout') && !r.takeout) return false;
    if(f.amenities.has('dinein') && !r.dinein) return false;
    if(f.amenities.has('late') && !r.late) return false;
    if(f.amenities.has('veg') && !r.veg) return false;
    return true;
  });
  if(f.sort==='rating') list.sort((a,b)=>b.rating-a.rating);
  if(f.sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(f.sort==='recent') list.sort((a,b)=>b.lastVerified.localeCompare(a.lastVerified));

  const methodMeta = presetMethod ? METHODS[presetMethod] : null;

  const activeChips = [];
  if(f.city) activeChips.push(['city', f.city]);
  if(f.cuisine) activeChips.push(['cuisine', f.cuisine]);
  if(f.q) activeChips.push(['q', f.q]);
  f.methodFilters.forEach(m=>activeChips.push(['method', METHODS[m].label]));
  f.amenities.forEach(a=>activeChips.push(['amenity', a]));

  return `
  <section class="section wrap">
    ${methodMeta ? `
      <div class="eyebrow">Dedicated Halal-Method Page</div>
      <h2 style="margin:8px 0 6px;">${methodMeta.dot} ${methodMeta.label} Restaurants in the GTA</h2>
      <p class="section-sub" style="margin-bottom:20px;max-width:680px;">Browse GTA restaurants tagged as ${methodMeta.label.toLowerCase()}. Filter further by city or cuisine below. ${DISCLAIMER}</p>
    ` : `
      <div class="section-head"><div><h2>Halal Restaurant Directory</h2><p class="section-sub">Search by name, city, cuisine, distance, or rating.</p></div></div>
    `}

    <div class="directory-layout">
      <aside class="filter-panel">
        <div class="filter-group">
          <h5>Search</h5>
          <input class="text-field" placeholder="Restaurant or cuisine..." value="${f.q}" oninput="setFilter('q', this.value)">
        </div>
        <div class="filter-group">
          <h5>City</h5>
          <select class="select-field" onchange="setFilter('city', this.value)">
            <option value="">All cities</option>
            ${CITIES.map(c=>`<option ${f.city===c?'selected':''}>${c}</option>`).join("")}
          </select>
        </div>
        <div class="filter-group">
          <h5>Cuisine</h5>
          <select class="select-field" onchange="setFilter('cuisine', this.value)">
            <option value="">All cuisines</option>
            ${CUISINES.map(c=>`<option ${f.cuisine===c?'selected':''}>${c}</option>`).join("")}
          </select>
        </div>
        <div class="filter-group">
          <h5>Halal Method</h5>
          ${Object.entries(METHODS).map(([k,m])=>`
            <label class="check-row"><input type="checkbox" ${f.methodFilters.has(k)?'checked':''} onchange="toggleSetFilter('methodFilters','${k}')"> ${m.dot} ${m.label}</label>
          `).join("")}
        </div>
        <div class="filter-group">
          <h5>Amenities</h5>
          ${[['prayer','Prayer space available'],['parking','Parking'],['delivery','Delivery'],['takeout','Takeout'],['dinein','Dine-in'],['late','Open late'],['veg','Vegetarian options']].map(([k,l])=>`
            <label class="check-row"><input type="checkbox" ${f.amenities.has(k)?'checked':''} onchange="toggleSetFilter('amenities','${k}')"> ${l}</label>
          `).join("")}
        </div>
        <button class="btn btn-outline btn-block" onclick="clearFilters()">Clear all filters</button>
      </aside>

      <div>
        <div class="toolbar">
          <span class="count">${list.length} result${list.length!==1?'s':''}</span>
          <select class="select-field" style="width:auto;" onchange="setFilter('sort', this.value)">
            <option value="rating" ${f.sort==='rating'?'selected':''}>Sort: Highest Rated</option>
            <option value="name" ${f.sort==='name'?'selected':''}>Sort: Name A–Z</option>
            <option value="recent" ${f.sort==='recent'?'selected':''}>Sort: Recently Verified</option>
          </select>
        </div>
        ${activeChips.length? `<div class="chip-row">${activeChips.map(([type,label])=>`<span class="chip">${label}<button onclick="removeChip('${type}','${label}')">✕</button></span>`).join("")}</div>`:""}
        ${list.length ? `<div class="grid grid-3">${list.map(restaurantCard).join("")}</div>` : `
          <div class="empty-state"><h4>No restaurants match your filters</h4><p>Try clearing a filter or search a different city. Know a place we're missing?</p>
          <button class="btn btn-primary" style="margin-top:14px;" onclick="go('submit')">Submit a Listing</button></div>`}
      </div>
    </div>
  </section>`;
}
function setFilter(key,val){ state.filters[key]=val; render(); }
function toggleSetFilter(key,val){
  const s = state.filters[key];
  s.has(val)? s.delete(val): s.add(val);
  render();
}
function clearFilters(){
  state.filters = { q:"", city:"", cuisine:"", methodFilters:new Set(), amenities:new Set(), sort:"rating" };
  render();
}
function removeChip(type,label){
  if(type==='city') state.filters.city="";
  if(type==='cuisine') state.filters.cuisine="";
  if(type==='q') state.filters.q="";
  if(type==='method'){ const k=Object.keys(METHODS).find(k=>METHODS[k].label===label); state.filters.methodFilters.delete(k); }
  if(type==='amenity') state.filters.amenities.delete(label);
  render();
}

    <div class="section-head"><div><h2>My Dashboard</h2><p class="section-sub">${state.user?('Welcome back, '+state.user.name):'Signed in as Demo Guest'}</p></div>
      ${!state.user?`<button class="btn btn-primary" onclick="fakeSignIn()">Sign In</button>`:`<button class="btn btn-outline" onclick="signOut()">Sign Out</button>`}
    </div>
    <div class="dash-shell">
      <div class="dash-side">
        <a class="active">Overview</a>
        <a onclick="go('restaurants')">Browse Restaurants</a>
        <a onclick="go('masjids')">Browse Masjids</a>
        <a onclick="go('submit')">Submit a Listing</a>
      </div>
      <div class="dash-main">
        <div class="stat-grid">
          <div class="stat-box"><b>${favR.length}</b><span>Saved Restaurants</span></div>
          <div class="stat-box"><b>${favM.length}</b><span>Saved Masjids</span></div>
          <div class="stat-box"><b>${recent.length}</b><span>Recently Viewed</span></div>
          <div class="stat-box"><b>${mySubs.length}</b><span>Submissions</span></div>
        </div>

        <h4 style="margin-bottom:12px;">Favorite Restaurants</h4>
        ${favR.length? `<div class="grid grid-3" style="margin-bottom:28px;">${favR.map(restaurantCard).join("")}</div>` : `<p style="margin-bottom:28px;">No saved restaurants yet. <a style="color:var(--forest);text-decoration:underline;cursor:pointer;" onclick="go('restaurants')">Browse the directory →</a></p>`}

        <h4 style="margin-bottom:12px;">Favorite Masjids</h4>
        ${favM.length? `<div class="grid grid-3" style="margin-bottom:28px;">${favM.map(masjidCard).join("")}</div>` : `<p style="margin-bottom:28px;">No saved masjids yet.</p>`}

        <h4 style="margin-bottom:12px;">My Submissions</h4>
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>City</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>
            ${mySubs.map(s=>`<tr><td>${s.name}</td><td>${s.type}</td><td>${s.city}</td><td><span class="status-tag status-${s.status}">${s.status}</span></td><td class="mono">${s.date}</td></tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  </section>`;
}
function fakeSignIn(){ state.user={name:"Yusuf A.", email:"demo@halalnearme.ca"}; toast("Signed in as Demo Guest"); render(); }
function signOut(){ state.user=null; toast("Signed out"); render(); }

/* ---------------- PAGE: ADMIN DASHBOARD ---------------- */
let adminTab = 'submissions';
function pageAdmin(){
  const pending = state.submissions.filter(s=>s.status==='pending');
  const approved = state.submissions.filter(s=>s.status==='approved');
  const rejected = state.submissions.filter(s=>s.status==='rejected');
  return `
  <section class="wrap section">
    <div class="section-head"><div><h2>Admin Dashboard</h2><p class="section-sub">Manage listings, submissions, and site data.</p></div>
      <button class="btn btn-outline" onclick="exportData()">⬇ Export Data (JSON)</button>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><b>${RESTAURANTS.length}</b><span>Live Restaurants</span></div>
      <div class="stat-box"><b>${MASJIDS.length}</b><span>Live Masjids</span></div>
      <div class="stat-box"><b>${pending.length}</b><span>Pending Review</span></div>
      <div class="stat-box"><b>${approved.length+rejected.length}</b><span>Reviewed This Month</span></div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${adminTab==='submissions'?'active':''}" onclick="setAdminTab('submissions')">Submissions</button>
      <button class="tab-btn ${adminTab==='restaurants'?'active':''}" onclick="setAdminTab('restaurants')">Restaurants</button>
      <button class="tab-btn ${adminTab==='masjids'?'active':''}" onclick="setAdminTab('masjids')">Masjids</button>
      <button class="tab-btn ${adminTab==='users'?'active':''}" onclick="setAdminTab('users')">Users</button>
    </div>

    ${adminTab==='submissions'? `
      <table>
        <thead><tr><th>Name</th><th>Type</th><th>City</th><th>Submitted by</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${state.submissions.map(s=>`
            <tr>
              <td>${s.name}</td><td>${s.type}</td><td>${s.city}</td><td>${s.submittedBy}</td><td class="mono">${s.date}</td>
              <td><span class="status-tag status-${s.status}">${s.status}</span></td>
              <td>
                ${s.status==='pending'? `<button class="btn btn-sm btn-primary" onclick="reviewSubmission('${s.id}','approved')">Approve</button> <button class="btn btn-sm btn-outline" onclick="reviewSubmission('${s.id}','rejected')">Reject</button>`
                : `<button class="btn btn-sm btn-ghost" onclick="reviewSubmission('${s.id}','pending')">Reset</button>`}
              </td>
            </tr>`).join("")}
        </tbody>
      </table>
    ` : ""}

    ${adminTab==='restaurants'? `
      <table>
        <thead><tr><th>Name</th><th>City</th><th>Method</th><th>Rating</th><th>Last Verified</th><th>Actions</th></tr></thead>
        <tbody>
          ${RESTAURANTS.slice(0,15).map(r=>`
            <tr><td>${r.name}</td><td>${r.city}</td><td>${methodBadge(r.method)}</td><td>★ ${r.rating}</td><td class="mono">${r.lastVerified}</td>
            <td><button class="btn btn-sm btn-outline" onclick="viewRestaurant('${r.slug}')">View</button> <button class="btn btn-sm btn-ghost" onclick="toast('Edit form would open here')">Edit</button> <button class="btn btn-sm btn-ghost" onclick="toast('Listing marked featured')">Feature</button></td></tr>`).join("")}
        </tbody>
      </table>
      <p style="margin-top:10px;font-size:12.5px;">Showing 15 of ${RESTAURANTS.length} listings.</p>
    ` : ""}

    ${adminTab==='masjids'? `
      <table>
        <thead><tr><th>Name</th><th>City</th><th>Jummah</th><th>Last Updated</th><th>Actions</th></tr></thead>
        <tbody>
          ${MASJIDS.map(m=>`
            <tr><td>${m.name}</td><td>${m.city}</td><td>${m.jummah}</td><td class="mono">${m.lastUpdated}</td>
            <td><button class="btn btn-sm btn-outline" onclick="viewMasjid('${m.slug}')">View</button> <button class="btn btn-sm btn-ghost" onclick="toast('Edit form would open here')">Edit</button></td></tr>`).join("")}
        </tbody>
      </table>
    ` : ""}

    ${adminTab==='users'? `
      <table>
        <thead><tr><th>User</th><th>Role</th><th>Submissions</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>
          <tr><td>Demo Guest</td><td>User</td><td>${state.submissions.length}</td><td class="mono">2026-06-01</td><td><button class="btn btn-sm btn-outline" onclick="toast('User moderation coming soon')">Moderate</button></td></tr>
          <tr><td>amina@demo.com</td><td>User</td><td>1</td><td class="mono">2026-05-14</td><td><button class="btn btn-sm btn-outline" onclick="toast('User moderation coming soon')">Moderate</button></td></tr>
          <tr><td>yusuf@demo.com</td><td>User</td><td>1</td><td class="mono">2026-04-22</td><td><button class="btn btn-sm btn-outline" onclick="toast('User moderation coming soon')">Moderate</button></td></tr>
        </tbody>
      </table>
    ` : ""}
  </section>`;
}
function setAdminTab(t){ adminTab=t; render(); }
function reviewSubmission(id, status){
  const s = state.submissions.find(x=>x.id===id);
  if(s){ s.status=status; toast("Submission "+status); render(); }
}
function exportData(){
  const blob = new Blob([JSON.stringify({restaurants:RESTAURANTS, masjids:MASJIDS, submissions:state.submissions}, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download="halal-near-me-export.json"; a.click();
  toast("Export downloaded");
}

/* ---------------- MAIN RENDER ---------------- */
function render(){
  const app = document.getElementById('app');
  let body = "";
  switch(state.route){
    case "home": body = pageHome(); break;
    case "restaurants": body = pageRestaurants(); break;
    case "restaurant": body = pageRestaurantDetail(state.params.slug); break;
    case "masjids": body = pageMasjids(); break;
    case "masjid": body = pageMasjidDetail(state.params.slug); break;
    case "submit": body = pageSubmit(); break;
    case "about": body = pageAbout(); break;
    case "contact": body = pageContact(); break;
    case "travel": body = pageComingSoon("Travel Mode", "Plan halal-friendly road trips: restaurants on your route, nearby masjids, prayer stops, and hotels near masjids.", "🧭"); break;
    case "cities": body = pageComingSoon("Muslim-Friendly Cities", "City rankings based on halal restaurants, masjids, Islamic schools, Muslim population, and community events.", "🏙️"); break;
    case "dashboard": body = pageDashboard(); break;
    case "admin": body = pageAdmin(); break;
    case "method": {
      const key = Object.keys(METHODS).find(k=>METHODS[k].slug===state.params.slug);
      body = pageRestaurants(key);
      break;
    }
    default: body = pageHome();
  }
  app.innerHTML = headerHTML() + `<main style="flex:1;">${body}</main>` + footerHTML();
}

/* ---------------- INIT ---------------- */
if(!location.hash) location.hash = "#/home";
route();
</script>
</body>
</html>
